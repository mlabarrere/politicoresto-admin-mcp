# See https://pre-commit.com for details. Run `pre-commit install` after `pip install -e ".[dev]"`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies:
          - "pydantic>=2.0"
          - "httpx>=0.27.0"
          - "python-dotenv>=1.0.0"
          - "pytest>=8.0"
          - "respx>=0.21"
        args: ["--config-file=pyproject.toml"]
        files: ^(src|tests)/

  - repo: local
    hooks:
      - id: no-service-role-key
        name: Block SUPABASE_SERVICE_ROLE_KEY values in staged files
        entry: python scripts/check_no_service_role_key.py
        language: system
        pass_filenames: true
        # Only scan text files; the script ignores binaries itself.
